name: Build mainline image

# Every push to the default branch builds and pushes a multi-arch image under
# two tags:
#   - `latest`                 human/compat pointer to the newest master build
#   - `master-<sha>-<ts>`      immutable tag ArgoCD image-updater orders and
#                              pins into deploy/chart/values-stage.yaml (stage
#                              auto-deploy). See the zdravniki-stage ImageUpdater
#                              CR in sledilnik/infrastructure.
# Deployment is GitOps. Promotion to prod is a vYYYY.MM.DD GitHub release, which
# builds its own pinned image (prod.yml).

on:
  push:
    branches:
      - master
    paths-ignore:
      # ArgoCD image-updater commits the new tag back into deploy/ after each
      # build. Ignore it so that write-back doesn't retrigger build -> push ->
      # write-back forever.
      - 'deploy/**'

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'NOBUILD')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "tag=master-$(git rev-parse --short HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push docker container image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/doctors-website:latest
            ghcr.io/${{ github.repository_owner }}/doctors-website:${{ steps.tag.outputs.tag }}
