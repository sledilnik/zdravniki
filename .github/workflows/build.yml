name: Build mainline image

# Every push to the default branch builds and pushes a uniquely tagged image.
# Deployment is GitOps: argocd-image-updater (in sledilnik/infrastructure)
# picks up the newest `master-<sha>-<ts>` tag and bumps the stage Application
# automatically. Promotion to prod is a manual edit of image.tag in
# deploy/chart/values-prod.yaml there.

on:
  push:
    branches:
      - master

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'NOBUILD')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tag
        id: tag
        # master-<short-sha>-<unix-ts>: matches the image-updater allow-tags
        # regexp and its newest-build ordering.
        run: echo "tag=master-$(git rev-parse --short HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push docker container image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/doctors-website:${{ steps.tag.outputs.tag }}
