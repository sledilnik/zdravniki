name: Build production image

# A published GitHub release (tag vYYYY.MM.DD) builds and pushes a multi-arch
# image tagged with the release name. Deployment is GitOps: pin image.tag in
# deploy/chart/values-prod.yaml (sledilnik/infrastructure -> zdravniki-prod) to
# that tag to promote it to production.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push docker container image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/doctors-website:${{ github.event.release.tag_name }}
