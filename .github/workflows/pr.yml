name: Build preview image

# Builds and pushes a per-PR image for previews. Deployment is GitOps: the
# zdravniki-preview ApplicationSet in sledilnik/infrastructure renders the
# chart from this PR's head commit and points it at this tag. Only PRs the
# maintainers label `preview-deploy` are built and deployed; closing the PR or
# removing the label prunes the environment.

on:
  pull_request:
    types: [synchronize, reopened, labeled]

jobs:
  build:
    # Any of the accepted preview labels (kept in sync with previewLabels in
    # sledilnik/infrastructure's argocd/apps/values.yaml).
    if: >-
      contains(github.event.pull_request.labels.*.name, 'preview-deploy') ||
      contains(github.event.pull_request.labels.*.name, 'deploy-preview') ||
      contains(github.event.pull_request.labels.*.name, 'deploy:preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push docker container image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/doctors-website:pr-${{ github.event.pull_request.number }}
