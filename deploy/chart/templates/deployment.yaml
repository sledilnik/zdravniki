apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zdravniki.fullname" . }}
  labels:
    {{- include "zdravniki.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zdravniki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zdravniki.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: website
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          # Rendered into /env.js at request time by Caddy; the browser reads
          # these via window._env_ (see the app's src/env.js).
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
