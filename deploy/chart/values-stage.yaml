# picks up a freshly pushed `latest`.
image:
  tag: master-72de0e6-1784189019
  pullPolicy: Always
  repository: ghcr.io/sledilnik/doctors-website
host: stage-zdravniki.sledilnik.org
env:
  REACT_APP_MODE: staging
